# Jekyll 配置 - 历法科学图书

# 站点信息
title: "历法科学"
subtitle: "全球历法的数学与天文探索"
description: 本书从数学和科学角度全面介绍世界各地的历法系统，涵盖时间测量基础、阳历体系、阴历与阴阳合历、复杂混合系统、数学分析和先进数学理论、地外历法七大主题。
author: "LLM"
lang: zh-CN
timezone: Asia/Shanghai

# Jekyll 设置
markdown: kramdown
highlighter: rouge
lsi: false
incremental: false

# 插件配置
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-remote-theme

# 主题配置
remote_theme: just-the-docs/just-the-docs@v0.12.0

# GitHub Pages baseurl
baseurl: "/lunar-calendar"
url: https://wanglongqi.github.io

# 搜索配置
search:
    heading_level: 2
    previews: true

# Just the Docs 配置
nav_external_links:
  - title: GitHub Repository
    url: https://github.com/wanglongqi/lunar-calendar
    toggle: false

# Mermaid 图表支持
mermaid:
  version: "10.9.0"
  # path: "/assets/js/mermaid.min.js"  # 如果使用本地文件

# 数学公式配置
mathjax:
  tex:
    inlineMath: [['$', '$'], ['\\(', '\\)']]
    displayMath: [['$$', '$$'], ['\\[', '\\]']]
  tags: 'ams'

# 输出目录
destination: _site
